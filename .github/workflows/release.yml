name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure (Release)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "${{ github.workspace }}\stage\Skore-Windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem -Path build\bin -File `
            | Where-Object { $_.Extension -in '.dll', '.exe' } `
            | Where-Object { $_.BaseName -notlike 'SkoreTests*' } `
            | Copy-Item -Destination $stage
          Get-ChildItem $stage

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $zip = "${{ github.workspace }}\Skore-$tag-Windows-x64.zip"
          Compress-Archive -Path "${{ github.workspace }}\stage\Skore-Windows-x64\*" -DestinationPath $zip
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Skore ${{ github.event.inputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: ${{ env.ASSET }}
